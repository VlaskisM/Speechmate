services:
  postgres:
    image: postgres:17
    container_name: speechmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: speechmate-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "${S3_PORT}:9000"
      - "9002:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  app:
    build:
      context: .
      dockerfile: data_ingress/Dockerfile
    container_name: speechmate-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: speechmate-postgres
      DB_PORT: 5432
      S3_ENDPOINT: http://speechmate-minio:9000
    depends_on:
      - postgres
      - minio

volumes:
  postgres_data:
  minio_data:
